<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ARINC 3D Tiles Viewer (Cesium)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cesium@1.126.0/Build/Cesium/Widgets/widgets.css" />
    <style>
      html,
      body,
      #cesiumContainer {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #11161a;
        overflow: hidden;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      #panel {
        position: absolute;
        z-index: 10;
        top: 12px;
        left: 12px;
        width: min(560px, calc(100vw - 24px));
        background: rgba(255, 255, 255, 0.92);
        color: #1f2a30;
        border: 1px solid #9ca9b3;
        border-radius: 12px;
        padding: 10px;
      }
      .row {
        display: flex;
        gap: 8px;
        margin: 6px 0;
      }
      input {
        flex: 1;
        border: 1px solid #aeb8bf;
        border-radius: 8px;
        padding: 8px;
        font-size: 12px;
      }
      button {
        border: 1px solid #1f2a30;
        border-radius: 8px;
        background: #1f2a30;
        color: #f7fafc;
        font-size: 12px;
        padding: 8px 10px;
        cursor: pointer;
      }
      #status {
        font-size: 12px;
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div id="panel">
      <div><strong>Cesium 3D Tiles inspector</strong></div>
      <div class="row">
        <label for="indexUrl">Index</label>
        <input id="indexUrl" type="text" />
        <button id="load" type="button">Load</button>
      </div>
      <div class="row">
        <button id="pick3dDir" type="button">Select 3dtiles folder</button>
        <button id="pickIndexFile" type="button">Select index JSON</button>
      </div>
      <div style="font-size:11px; opacity:0.8">URL supports <code>visualization.index.json</code> or <code>3dtiles/index.json</code></div>
      <div id="status"></div>
    </div>
    <div id="cesiumContainer"></div>
    <input id="threeDDirInput" type="file" webkitdirectory directory multiple hidden />
    <input id="indexFileInput" type="file" accept=".json,application/json" hidden />

    <script src="https://cdn.jsdelivr.net/npm/cesium@1.126.0/Build/Cesium/Cesium.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
