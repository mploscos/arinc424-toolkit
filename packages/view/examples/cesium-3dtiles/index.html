<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ARINC 3D Tiles Viewer (Cesium)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cesium@1.126.0/Build/Cesium/Widgets/widgets.css" />
    <style>
      html,
      body,
      #cesiumContainer {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #11161a;
        overflow: hidden;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      #panel {
        position: absolute;
        z-index: 10;
        top: 12px;
        left: 12px;
        width: min(560px, calc(100vw - 24px));
        background: rgba(255, 255, 255, 0.92);
        color: #1f2a30;
        border: 1px solid #9ca9b3;
        border-radius: 12px;
        padding: 10px;
      }
      .row {
        display: flex;
        gap: 8px;
        margin: 6px 0;
      }
      input {
        flex: 1;
        border: 1px solid #aeb8bf;
        border-radius: 8px;
        padding: 8px;
        font-size: 12px;
      }
      button {
        border: 1px solid #1f2a30;
        border-radius: 8px;
        background: #1f2a30;
        color: #f7fafc;
        font-size: 12px;
        padding: 8px 10px;
        cursor: pointer;
      }
      #status {
        font-size: 12px;
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div id="panel">
      <div><strong>Cesium 3D Tiles inspector</strong></div>
      <div class="row">
        <label for="indexUrl">Index</label>
        <input id="indexUrl" type="text" />
        <button id="load" type="button">Load</button>
      </div>
      <div class="row">
        <button id="pickIndexFile" type="button">Select visualization.index.json</button>
      </div>
      <div style="font-size:11px; opacity:0.8">Use URL or select <code>visualization.index.json</code></div>
      <div style="font-size:11px; opacity:0.8">Add <code>&debug=1</code> for index/tileset load traces.</div>
      <div style="font-size:11px; opacity:0.8">Basemap mode: <code>?basemap=muted</code> (default) or <code>?basemap=standard</code></div>
      <div style="font-size:11px; margin-top:8px; border-top:1px solid #d9e2d9; padding-top:6px">
        <div><strong>Procedures</strong></div>
        <label><input id="procShow" type="checkbox" /> show procedures</label><br />
        <label for="procAirport">airport</label>
        <select id="procAirport">
          <option value="all">all</option>
        </select>
        <label for="procRunway">runway</label>
        <select id="procRunway">
          <option value="all">all</option>
        </select><br />
        <label for="procType">type</label>
        <select id="procType">
          <option value="all">all</option>
          <option value="SID">SID</option>
          <option value="STAR">STAR</option>
          <option value="APPROACH">APPROACH</option>
        </select>
        <label for="procSelect">procedure</label>
        <select id="procSelect">
          <option value="all">all</option>
        </select>
      </div>
      <div style="font-size:11px; margin-top:8px; border-top:1px solid #d9e2d9; padding-top:6px">
        <div><strong>Visual QA</strong></div>
        <label><input id="qaShowIssues" type="checkbox" checked /> show issues</label><br />
        <label for="qaSeverity">severity</label>
        <select id="qaSeverity">
          <option value="all">all</option>
          <option value="error">error</option>
          <option value="warning">warning</option>
        </select>
        <label for="qaType">type</label>
        <select id="qaType">
          <option value="all">all</option>
        </select>
        <div id="qaStats" style="margin-top:4px; opacity:0.85"></div>
      </div>
      <div id="status"></div>
      <div id="issueInspector" style="display:none; font-size:11px; margin-top:8px; max-height:220px; overflow:auto; border-top:1px solid #d9e2d9; padding-top:6px"></div>
    </div>
    <div id="cesiumContainer"></div>
    <input id="indexFileInput" type="file" accept=".json,application/json" hidden />

    <script src="https://cdn.jsdelivr.net/npm/cesium@1.126.0/Build/Cesium/Cesium.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
